name: Build

on:
  workflow_dispatch:
  push:
    branches:
      - master
    tags:
      - '*'
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v7
        with:
          submodules: true

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build project
        run: |
          chmod +x ./gradlew
          ./gradlew build

      - name: Upload debug APKs
        uses: actions/upload-artifact@v7
        with:
          name: debug-apks
          path: ./app/build/outputs/apk/debug/*.apk

      - name: Upload release APKs
        uses: actions/upload-artifact@v7
        with:
          name: release-apks
          path: ./app/build/outputs/apk/release/*.apk
